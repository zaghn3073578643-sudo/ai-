<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能力测评系统</title>

    <link rel="stylesheet" href="css/style.css">
    <!-- 工具CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>
    <h1 style="text-align:center;">能力测评系统</h1>

    <!-- 首页区域 -->
    <div id="homePage" class="container">
        <h2>AI性格测评</h2>
        <input type="text" id="nickname" placeholder="输入你的昵称">
        <button id="startBtn">开始测评</button>
    </div>

    <!-- 答题页面，默认隐藏 -->
    <div id="quizPage" class="quiz-container" style="display: none;">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <p class="progress-text"></p>
        <div class="question-box"></div>
        <div class="option-list">
            <div class="option"></div>
            <div class="option"></div>
            <div class="option"></div>
            <div class="option"></div>
        </div>
        <br>
        <button class="small-btn" id="prev">上一题</button>
        <button class="small-btn" id="next">下一题</button>
    </div>

    <!-- 结果页面，默认隐藏 -->
    <div id="resultPage" class="result-container" style="display: none;">
        <h3 class="result-title"></h3>
        <div id="radar" style="width:600px;height:400px;border:1px solid #eee;"></div>
        <button id="restartBtn">重新测评</button>
        <button id="createCard">生成分享卡片</button>
    </div>

    <!-- 卡片页面，默认隐藏 -->
    <div id="cardPage" class="result-container" style="display: none;">
        <!-- 已修改cardBox，增加纯白背景，解决截图底色怪异 -->
        <div id="cardBox" style="padding:30px;border:1px solid #4A7DFF;border-radius:16px;background:#ffffff;width:400px;">
            <!-- Logo -->
            <div class="card-logo" style="text-align:center;margin-bottom:15px;">
                <h2>AI能力测评系统</h2>
            </div>
            <!-- 昵称+等级 -->
            <div class="card-title" style="text-align:center;font-size:20px;font-weight:bold;margin:10px 0;"></div>
            <!-- 标签 -->
            <div class="card-tag" style="text-align:center;margin:12px 0;color:#4A7DFF;"></div>
            <!-- 雷达图 -->
            <div id="card-radar" style="width:340px;height:280px;margin:0 auto;"></div>
            <!-- 二维码占位 -->
            <div class="card-qrcode" style="text-align:center;margin-top:20px;">
                <div style="width:100px;height:100px;background:#eee;margin:0 auto;display:flex;align-items:center;justify-content:center;">二维码</div>
                <p style="font-size:12px;color:#666;margin-top:6px;">扫码查看测评</p>
            </div>
        </div>
        <br>
        <button id="downloadCard">保存卡片图片</button>
        <button id="resetBtn">重新测试</button>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
